name: release-please

# On every push to main, run release-please. It scans Conventional-Commit
# messages since the last release tag and:
#   - opens/updates a "release PR" that bumps package.json + package-lock.json
#     and updates CHANGELOG.md when there are releasable commits (feat/fix/...);
#   - when that release PR merges, creates a `v<VERSION>` tag + GitHub Release
#     and the `publish` job ships the package to npm (with provenance via OIDC).
#
# RELEASE_PAT (not GITHUB_TOKEN) is used so the release PR's events trigger
# downstream workflows (CI). The release PR is the human review gate — merge it
# when ready (or add `ready-to-merge` if auto-merge is configured).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # RELEASE_PAT (a fine-grained PAT) lets the release PR's events trigger
          # downstream workflows (CI on the PR) + auto-merge arming. Falls back to
          # the built-in GITHUB_TOKEN when RELEASE_PAT isn't set — release-please
          # still opens the PR, it just won't trigger other workflows on it.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Strip always-auth from .npmrc (set by setup-node, deprecated in npm 11)
      - run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Idempotent: skip if this version is already on the registry.
      - name: Publish to npm (with provenance)
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "npm already has ${PKG}@${VERSION} — skipping publish."
            exit 0
          fi
          npm publish --access public --provenance
